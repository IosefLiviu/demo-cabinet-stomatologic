<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="toothGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2744;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect x="0" y="0" width="400" height="120" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Tooth icon -->
  <g transform="translate(30, 16) scale(0.55)">
    <path d="M80 20c-18-8-32 2-40 12C32 22 18 12 0 20c-12 6-8 32 0 56 6 18 16 52 28 68 4 4 8 4 12 0 8-12 12-32 12-32s4 20 12 32c4 4 8 4 12 0 12-16 22-50 28-68 8-24 12-50-4-56z"
          fill="url(#toothGrad)" stroke="#93c5fd" stroke-width="2"/>
    <!-- Sparkle on tooth -->
    <circle cx="22" cy="42" r="6" fill="white" opacity="0.5"/>
    <circle cx="22" cy="42" r="3" fill="white" opacity="0.8"/>
  </g>

  <!-- Text -->
  <text x="105" y="52" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#f0f9ff" letter-spacing="1">
    Cabinet Dentar
  </text>
  <text x="105" y="82" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="#60a5fa" letter-spacing="3">
    DEMO VERSION
  </text>

  <!-- Subtle accent line -->
  <rect x="105" y="88" width="180" height="2" rx="1" fill="#3b82f6" opacity="0.4"/>
</svg>
